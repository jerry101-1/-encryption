<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>作業本 - 雲端暫存區</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/16524/16524311.png" type="image/png">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: #fff;
        }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 140px;
        }
        .btn-encode-public { background-color: #3498db; }
        .btn-encode-public:hover { background-color: #2980b9; }
        
        .btn-encode-private { background-color: #8e44ad; }
        .btn-encode-private:hover { background-color: #71368a; }

        .btn-decode { background-color: #2ecc71; width: 100%; margin-top: 8px; }
        .btn-decode:hover { background-color: #27ae60; }
        
        .btn-copy { background-color: #e67e22; margin-top: 10px; width: 100%; }
        .btn-copy:hover { background-color: #d35400; }
        
        .btn-verify { background-color: #16a085; margin-top: 10px; width: 100%; }
        .btn-verify:hover { background-color: #117864; }
        
        .btn-admin-view { background-color: #e74c3c; margin-bottom: 15px; width: 100%; font-weight: bold;}
        .btn-admin-view:hover { background-color: #c0392b; }
        
        .btn-change-pw { background-color: #34495e; margin-top: 5px; width: 100%; }
        .btn-change-pw:hover { background-color: #2c3e50; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h2>個人雲端作業筆記本</h2>

    <div id="authBlock" class="form-group">
        <label for="userKey">請輸入密碼以解鎖作業本：</label>
        <input type="password" id="userKey" placeholder="請先輸入個人存取密碼...">
        <button class="btn-verify" onclick="verifyPassword()">🔓 進入系統</button>
    </div>

    <div id="mainBlock" class="hidden">
        
        <button id="adminViewBtn" class="btn-admin-view hidden" onclick="showAllPasswords()">👁️ 查看全體成員最新密碼與神祕前綴</button>
        
        <div id="adminMenuBlock" class="form-group hidden">
            <label for="encryptMode">⚙️ 管理員控制面板：切換個人加密對象</label>
            <select id="encryptMode">
                <option value="x9R2fK" selected>成員一 (小魚)</option>
                <option value="m4P7wQ">成員二 (Kris)</option>
                <option value="b2V9zX">成員三(林沐恩)</option>
                <option value="t5N1sJ">成員四</option>
                <option value="k8C3hY">成員五</option>
                <option value="v6G2mD">成員六</option>
                <option value="a7F5eR">成員七 (吳彥普)</option>
                <option value="p3K8qZ">成員八</option>
            </select>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        </div>

        <div class="form-group">
            <label for="inputText">📝 輸入內文字：</label>
            <textarea id="inputText" placeholder="加密：輸入任意文字...&#10;解密：貼上密文並點擊下方「解密」..."></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-encode-public" onclick="encodeProcess('public')">🌐 一般加密 (全員互通)</button>
            <button class="btn-encode-private" onclick="encodeProcess('private')">🔒 個人專用加密</button>
        </div>
        
        <button class="btn-decode" onclick="decodeProcess()">🔓 辨識並解密</button>

        <div class="form-group" style="margin-top: 20px;">
            <label for="outputText">✨ 處理結果輸出：</label>
            <textarea id="outputText" readonly placeholder="結果會顯示在這裡..."></textarea>
        </div>

        <button class="btn-copy" onclick="copyResult()">📋 一鍵複製結果</button>

        <div class="form-group" style="border-top: 1px dashed #ccc; padding-top: 15px; margin-top: 25px;">
            <label for="newPasswordInput">🛠️ 帳號安全：修改個人通道專屬密碼</label>
            <input type="password" id="newPasswordInput" placeholder="請輸入想要變更的新密碼...">
            <button class="btn-change-pw" onclick="changeCurrentPassword()">💾 確認修改密碼</button>
        </div>
    </div>

<script>
// 🛡️ 防 F12 指令碼
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
    if (e.key === "F12" || 
        ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i','j'].includes(e.key.toLowerCase())) ||
        ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'u')) {
        e.preventDefault();
        return false;
    }
});

const SUPER_ADMIN_KEY = "jerrya1011201@cindya1011202";

// 🌐 通用互通通道
const PUBLIC_PREFIX = "pub000";
const PUBLIC_KEY = "COMMON_MEMBER_SHARED_SECRET_2026";

// 👤 個人專屬通道對照表
const DEFAULT_PASSWORDS = {
    "x9R2fK": "userpass1", // 成員一 (小魚)
    "m4P7wQ": "Kris@Lucy",  // 成員二 (Kris)
    "b2V9zX": "userpass3",
    "t5N1sJ": "userpass4",
    "k8C3hY": "userpass5",
    "v6G2mD": "userpass6",
    "a7F5eR": "userpass7",
    "p3K8qZ": "userpass8"
};

const PREFIX_LENGTH = 6;

function getLatestPasswords() {
    const localData = localStorage.getItem('SYSTEM_MEMBER_KEYS');
    if (!localData) {
        localStorage.setItem('SYSTEM_MEMBER_KEYS', JSON.stringify(DEFAULT_PASSWORDS));
        return DEFAULT_PASSWORDS;
    }
    return JSON.parse(localData);
}

let currentRole = "user"; 
let loggedInPrefix = ""; 
let savedRawKey = "";    

function verifyPassword() {
    const inputKey = document.getElementById('userKey').value.trim();
    if (!inputKey) { alert("請輸入金鑰密碼！"); return; }
    savedRawKey = inputKey;
    const currentPasswords = getLatestPasswords();

    if (inputKey === SUPER_ADMIN_KEY) {
        currentRole = "admin";
        document.getElementById('authBlock').classList.add('hidden'); 
        document.getElementById('mainBlock').classList.remove('hidden'); 
        document.getElementById('adminMenuBlock').classList.remove('hidden'); 
        document.getElementById('adminViewBtn').classList.remove('hidden'); 
    } else {
        const matchedPrefix = Object.keys(currentPasswords).find(prefix => currentPasswords[prefix] === inputKey);
        if (matchedPrefix) {
            currentRole = "user";
            loggedInPrefix = matchedPrefix; 
            document.getElementById('authBlock').classList.add('hidden'); 
            document.getElementById('mainBlock').classList.remove('hidden'); 
        } else {
            alert("❌ 密碼驗證失敗，拒絕存取！");
        }
    }
}

function showAllPasswords() {
    if (currentRole !== "admin") return;
    const currentPasswords = getLatestPasswords();
    let msg = "📋 【全體成員金鑰密碼與神祕前綴對照表】\n\n";
    const names = ["成員一 (小魚)", "成員二 (Kris)", "成員三", "成員四", "成員五", "成員六", "成員七", "成員八"];
    Object.keys(currentPasswords).forEach((prefix, i) => {
        msg += `${names[i]} ➡️ 前綴: ${prefix} | 密碼: ${currentPasswords[prefix]}\n`;
    });
    alert(msg);
}

function changeCurrentPassword() {
    const newPassword = document.getElementById('newPasswordInput').value.trim();
    if (!newPassword) { alert("請輸入有效的新密碼！"); return; }
    let targetPrefix = (currentRole === "admin") ? document.getElementById('encryptMode').value : loggedInPrefix;
    
    const currentPasswords = getLatestPasswords();
    currentPasswords[targetPrefix] = newPassword; 
    localStorage.setItem('SYSTEM_MEMBER_KEYS', JSON.stringify(currentPasswords)); 
    
    alert(`💾 修改成功！個人通道密碼已重設為：${newPassword}`);
    document.getElementById('newPasswordInput').value = "";
    if (currentRole !== "admin") savedRawKey = newPassword;
}

function cyrb128(str) {
    let h1 = 1779033703, h2 = 3024734765, h3 = 3362453663, h4 = 502494325;
    for (let i = 0, k; i < str.length; i++) {
        k = str.charCodeAt(i);
        h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
        h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
        h3 = h4 ^ Math.imul(h4 ^ k, 2869860233);
        h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    return [(h1^h2)>>>0, h2>>>0, h3>>>0, h4>>>0];
}
function sfc32(a, b, c, d) {
    return function() {
        a >>>= 0; b >>>= 0; c >>>= 0; d >>>= 0;
        var t = (a + b) | 0;
        a = b ^ (b >>> 9); b = (c + (c << 3)) | 0;
        c = (c << 21) | (c >>> 11); d = (d + 1) | 0;
        t = (t + d) | 0; c = (c + t) | 0;
        return (t >>> 0) / 4294967296;
    }
}

// 🔐 加密處理 (劃分：一般通用 vs 個人專屬)
function encodeProcess(type) {
    let mode = ""; 
    let encryptionKey = "";
    const currentPasswords = getLatestPasswords();

    if (type === 'public') {
        // 🌐 一般加密：使用共享金鑰與公用前綴
        mode = PUBLIC_PREFIX;
        encryptionKey = PUBLIC_KEY;
    } else {
        // 🔒 個人加密：使用成員個人專屬通道
        if (currentRole === "admin") {
            mode = document.getElementById('encryptMode').value;
            encryptionKey = currentPasswords[mode]; 
        } else {
            mode = loggedInPrefix;
            encryptionKey = savedRawKey;
        }
    }
    
    const input = document.getElementById('inputText').value;
    if(!input) { alert("請先輸入文字再加密！"); return; }
    
    let seed = cyrb128(encryptionKey);
    let rand = sfc32(seed[0], seed[1], seed[2], seed[3]);
    
    let result = mode; 
    for (let i = 0; i < input.length; i++) {
        let code = input.charCodeAt(i);
        let randomShift = Math.floor(rand() * 65536);
        let cipherCode = (code + randomShift) % 65536;
        result += cipherCode.toString(16).padStart(4, '0');
    }
    document.getElementById('outputText').value = result;
}

// 🔓 智能解密處理 (自動識別是通用密碼還是個人密碼)
function decodeProcess() {
    const input = document.getElementById('inputText').value.trim();
    if (input.length < PREFIX_LENGTH) {
        document.getElementById('outputText').value = "？？？";
        return;
    }
    
    const detectedHeader = input.substring(0, PREFIX_LENGTH);
    const currentPasswords = getLatestPasswords();
    
    let targetPassword = "";
    
    // 1. 判斷是否為一般互通密文
    if (detectedHeader === PUBLIC_PREFIX) {
        targetPassword = PUBLIC_KEY;
    } else {
        // 2. 判斷是否為個人密文
        const rawPass = currentPasswords[detectedHeader];
        // 只有管理員，或者與目前登入者密碼相符的人，才能解開該個人密文
        if (rawPass && (currentRole === "admin" || savedRawKey === rawPass)) {
            targetPassword = rawPass;
        }
    }
    
    // 驗證無效或非本人權限
    if (!targetPassword) {
        let questionMarkResult = "";
        let charCount = Math.floor((input.length - PREFIX_LENGTH) / 4);
        for (let i = 0; i < charCount; i++) questionMarkResult += "？";
        document.getElementById('outputText').value = questionMarkResult || "？？？";
        return;
    }
    
    let bodyText = input.substring(PREFIX_LENGTH).replace(/[^0-9a-fA-F]/g, "");
    let seed = cyrb128(targetPassword);
    let rand = sfc32(seed[0], seed[1], seed[2], seed[3]);
    let result = "";
    
    for (let i = 0; i < bodyText.length; i += 4) {
        let hexToken = bodyText.substring(i, i + 4);
        if (hexToken.length === 4) {
            let cipherCode = parseInt(hexToken, 16);
            let randomShift = Math.floor(rand() * 65536);
            let rawCode = (cipherCode - randomShift + 65536) % 65536;
            result += String.fromCharCode(rawCode);
        }
    }
    document.getElementById('outputText').value = result;
}

function copyResult() {
    const outputText = document.getElementById('outputText');
    if (!outputText.value) { alert("沒有內容可以複製！"); return; }
    outputText.select();
    navigator.clipboard.writeText(outputText.value).then(() => alert("📋 內容已成功複製！"));
}
</script>
</body>
</html>
