<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/16524/16524311.png" type="image/png">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: #fff;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .status-tag { font-size: 13px; color: #16a085; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 140px;
        }
        .btn-encode-public { background-color: #3498db; }
        .btn-encode-public:hover { background-color: #2980b9; }
        .btn-encode-private { background-color: #8e44ad; }
        .btn-encode-private:hover { background-color: #71368a; }
        .btn-decode { background-color: #2ecc71; width: 100%; margin-top: 8px; }
        .btn-decode:hover { background-color: #27ae60; }
        .btn-copy { background-color: #e67e22; margin-top: 10px; width: 100%; }
        .btn-copy:hover { background-color: #d35400; }
        .btn-verify { background-color: #16a085; margin-top: 10px; width: 100%; }
        .btn-verify:hover { background-color: #117864; }
        .btn-admin-view { background-color: #e74c3c; margin-bottom: 15px; width: 100%; font-weight: bold;}
        .btn-admin-view:hover { background-color: #c0392b; }
        .btn-change-pw { background-color: #34495e; margin-top: 5px; width: 100%; }
        .btn-change-pw:hover { background-color: #2c3e50; }
        .btn-changelog { background-color: #7f8c8d; width: 100%; margin-top: 15px; font-size: 13px; padding: 8px; }
        .btn-changelog:hover { background-color: #95a5a6; }
        
        .extra-pw-box {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        
        .changelog-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 15px;
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }
        .changelog-item { margin-bottom: 12px; }
        .changelog-version { font-weight: bold; color: #2c3e50; }
        .changelog-date { color: #7f8c8d; font-size: 12px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h2>📝 筆記本</h2>
    <div id="syncStatus" class="status-tag">連線雲端資料庫中...</div>

    <div id="authBlock" class="form-group">
        <label for="userKey">請輸入密碼以解鎖：</label>
        <input type="password" id="userKey" placeholder="請先輸入個人存取密碼...">
        <button class="btn-verify" onclick="verifyPassword()">🔓 進入系統</button>
    </div>

    <div id="mainBlock" class="hidden">
        
        <button id="adminViewBtn" class="btn-admin-view hidden" onclick="showAllPasswords()">👁️ 查看全體成員最新密碼表</button>
        
        <div id="adminMenuBlock" class="form-group hidden">
            <label for="encryptMode">⚙️ 管理員控制面板：選擇成員帳號</label>
            <select id="encryptMode">
                <option value="user1" selected>成員一 (小魚)</option>
                <option value="user2">成員二 (Kris)</option>
                <option value="user3">成員三 (林沐恩)</option>
                <option value="user4">成員四</option>
                <option value="user5">成員五</option>
                <option value="user6">成員六</option>
                <option value="user7">成員七 (吳彥普)</option>
                <option value="user8">成員八</option>
            </select>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        </div>

        <div class="form-group">
            <label for="inputText">輸入內文字：</label>
            <textarea id="inputText" placeholder="加密：輸入任意文字...&#10;解密：貼上密文自動解密..."></textarea>
        </div>

        <div class="form-group extra-pw-box">
            <label for="secondPassphrase" style="color: #856404;">第二重自訂密碼（選填/雙重加密）：</label>
            <input type="password" id="secondPassphrase" placeholder="加密時設定此欄，解密也必須輸入相同口令...">
        </div>

        <div class="btn-group">
            <button class="btn-encode-public" onclick="encodeProcess('public')">全員互通</button>
            <button class="btn-encode-private" onclick="encodeProcess('private')">個人加密</button>
        </div>
        
        <button class="btn-decode" onclick="decodeProcess()">手動解密</button>

        <div class="form-group" style="margin-top: 20px;">
            <label for="outputText">處理結果輸出：</label>
            <textarea id="outputText" readonly placeholder="結果會顯示在這裡..."></textarea>
        </div>

        <button class="btn-copy" onclick="copyResult()">一鍵複製結果</button>

        <div class="form-group" style="border-top: 1px dashed #ccc; padding-top: 15px; margin-top: 25px;">
            <label for="newPasswordInput">修改個人密碼</label>
            <input type="password" id="newPasswordInput" placeholder="請輸入想要變更的新密碼...">
            <button class="btn-change-pw" onclick="changeCurrentPassword()">確認修改</button>
        </div>

        <button class="btn-changelog" onclick="toggleChangelog()">檢視系統更新日誌 (Changelog)</button>
        <div id="changelogBox" class="changelog-box hidden">
            <div class="changelog-item">
                <span class="changelog-version">v3.2.0</span> <span class="changelog-date">2026/07</span>
                <ul>
                    <li><b>雙重加密：</b>所有人皆可自訂獨立「第二重密碼」，達成雙重 AES-256 加密防禦。</li>
                    <li><b>防窺探：</b>即使擁有通道密碼，未輸入正確第二重口令一樣無法還原內容。</li>
                </ul>
            </div>
            <div class="changelog-item">
                <span class="changelog-version">v3.0.0</span> <span class="changelog-date">2026/07</span>
                <ul>
                    <li>全面升級至 AES-256-GCM + PBKDF2 (100,000次迭代)。</li>
                    <li>完全移除前綴，增強密文隱蔽性與長度精簡。</li>
                </ul>
            </div>
            <div class="changelog-item">
                <span class="changelog-version">v1.0.0 - v2.1.0</span> <span class="changelog-date">2026/05-07</span>
                <ul>
                    <li>基礎筆記本、多通道隔離與自動貼上解密功能上線。</li>
                </ul>
            </div>
        </div>

    </div>

<script>
// 🛡️ 防 F12 指令碼
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
    if (e.key === "F12" || 
        ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i','j'].includes(e.key.toLowerCase())) ||
        ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'u')) {
        e.preventDefault();
        return false;
    }
});

const SUPER_ADMIN_KEY = "jerrya1011201@cindya1011202";
const PUBLIC_KEY = "COMMON_MEMBER_SHARED_SECRET_2026";

let livePasswords = {
    "user1": "userpass1", // 成員一 (小魚)
    "user2": "Kris@Lucy",  // 成員二 (Kris)
    "user3": "userpass3",  // 成員三 (林沐恩)
    "user4": "userpass4",
    "user5": "userpass5",
    "user6": "userpass6",
    "user7": "userpass7",  // 成員七 (吳彥普)
    "user8": "userpass8"
};

let currentRole = "user"; 
let currentUserAccount = ""; 
let savedRawKey = "";    

function toggleChangelog() {
    document.getElementById('changelogBox').classList.toggle('hidden');
}

const inputArea = document.getElementById('inputText');
inputArea.addEventListener('paste', () => { setTimeout(() => { autoDetectAndDecode(); }, 50); });
inputArea.addEventListener('input', () => { autoDetectAndDecode(); });

function autoDetectAndDecode() {
    const val = inputArea.value.trim();
    if (val.length >= 56 && /^[0-9a-fA-F]+$/.test(val)) {
        decodeProcess();
    }
}

async function fetchCloudPasswords() {
    try {
        const localBackup = localStorage.getItem('SYNC_MEMBER_KEYS');
        if(localBackup) livePasswords = JSON.parse(localBackup);
        document.getElementById('syncStatus').innerText = "🟢 連線正常";
    } catch (e) {
        document.getElementById('syncStatus').innerText = "🟡 系統就緒";
    }
}
fetchCloudPasswords();

function verifyPassword() {
    const inputKey = document.getElementById('userKey').value.trim();
    if (!inputKey) { alert("請輸入金鑰密碼！"); return; }
    savedRawKey = inputKey;

    if (inputKey === SUPER_ADMIN_KEY) {
        currentRole = "admin";
        document.getElementById('authBlock').classList.add('hidden'); 
        document.getElementById('mainBlock').classList.remove('hidden'); 
        document.getElementById('adminMenuBlock').classList.remove('hidden'); 
        document.getElementById('adminViewBtn').classList.remove('hidden'); 
    } else {
        const matchedAccount = Object.keys(livePasswords).find(acc => livePasswords[acc] === inputKey);
        if (matchedAccount) {
            currentRole = "user";
            currentUserAccount = matchedAccount; 
            document.getElementById('authBlock').classList.add('hidden'); 
            document.getElementById('mainBlock').classList.remove('hidden'); 
        } else {
            alert("❌ 密碼驗證失敗，拒絕存取！");
        }
    }
}

function showAllPasswords() {
    if (currentRole !== "admin") return;
    let msg = "📋【全體成員最新密碼對照表】\n\n";
    const names = ["成員一 (小魚)", "成員二 (Kris)", "成員三 (林沐恩)", "成員四 (未設定)", "成員五 (未設定)", "成員六 (未設定)", "成員七 (吳彥普)", "成員八 (未設定)"];
    Object.keys(livePasswords).forEach((accKey, i) => {
        msg += `${i + 1}. ${names[i]}\n   └─ 當前密碼：${livePasswords[accKey]}\n\n`;
    });
    alert(msg);
}

function changeCurrentPassword() {
    const newPassword = document.getElementById('newPasswordInput').value.trim();
    if (!newPassword) { alert("請輸入有效的新密碼！"); return; }
    let targetAcc = (currentRole === "admin") ? document.getElementById('encryptMode').value : currentUserAccount;
    
    livePasswords[targetAcc] = newPassword;
    localStorage.setItem('SYNC_MEMBER_KEYS', JSON.stringify(livePasswords));
    
    alert(`💾 修改成功！密碼已重設為：${newPassword}`);
    document.getElementById('newPasswordInput').value = "";
    if (currentRole !== "admin") savedRawKey = newPassword;
}

// -------------------------------------------------------------
// 🔐 加解密核心演算法 (支援金鑰串接)
// -------------------------------------------------------------

async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const baseKey = await window.crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
    return window.crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
    );
}

async function encodeProcess(type) {
    let baseKey = (type === 'public') ? PUBLIC_KEY : ((currentRole === "admin") ? livePasswords[document.getElementById('encryptMode').value] : savedRawKey);
    const secondPass = document.getElementById('secondPassphrase').value.trim();
    
    // 💡 如果填了第二重密碼，將兩把密碼組合成複合金鑰進行衍生
    const finalPassword = secondPass ? `${baseKey}:::${secondPass}` : baseKey;
    
    const input = document.getElementById('inputText').value;
    if(!input) { alert("請先輸入文字再加密！"); return; }

    try {
        const enc = new TextEncoder();
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));

        const key = await deriveKey(finalPassword, salt);
        const encryptedContent = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, enc.encode(input));

        const saltHex = Array.from(salt).map(b => b.toString(16).padStart(2, '0')).join('');
        const ivHex = Array.from(iv).map(b => b.toString(16).padStart(2, '0')).join('');
        const cipherHex = Array.from(new Uint8Array(encryptedContent)).map(b => b.toString(16).padStart(2, '0')).join('');

        document.getElementById('outputText').value = saltHex + ivHex + cipherHex;
    } catch(e) {
        alert("⚠️ 加密過程發生錯誤！");
    }
}

async function decodeProcess() {
    const input = document.getElementById('inputText').value.trim();
    if (input.length < 56 || !/^[0-9a-fA-F]+$/.test(input)) {
        document.getElementById('outputText').value = "？？？";
        return;
    }

    const secondPass = document.getElementById('secondPassphrase').value.trim();
    const rawCandidates = [savedRawKey, PUBLIC_KEY];
    
    if (currentRole === "admin") {
        Object.values(livePasswords).forEach(pw => { if(!rawCandidates.includes(pw)) rawCandidates.push(pw); });
    }

    // 組合候選密碼（包含第二重密碼情況）
    const candidateKeys = rawCandidates.map(k => secondPass ? `${k}:::${secondPass}` : k);

    const saltHex = input.substring(0, 32);
    const ivHex = input.substring(32, 56);
    const cipherHex = input.substring(56);

    const salt = new Uint8Array(saltHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
    const iv = new Uint8Array(ivHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
    const cipherBuffer = new Uint8Array(cipherHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));

    let successDecryptedText = null;

    for (let testKey of candidateKeys) {
        try {
            const key = await deriveKey(testKey, salt);
            const decryptedContent = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, cipherBuffer);
            const dec = new TextDecoder();
            successDecryptedText = dec.decode(decryptedContent);
            break;
        } catch (e) {}
    }

    if (successDecryptedText !== null) {
        document.getElementById('outputText').value = successDecryptedText;
    } else {
        document.getElementById('outputText').value = "？？？ (密碼錯誤、第二重密碼不符或數據已被篡改)";
    }
}

function copyResult() {
    const outputText = document.getElementById('outputText');
    if (!outputText.value) { alert("沒有內容可以複製！"); return; }
    outputText.select();
    navigator.clipboard.writeText(outputText.value).then(() => alert("📋 內容已成功複製！"));
}
</script>
</body>
</html>
