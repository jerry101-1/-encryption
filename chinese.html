<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首頁</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/16524/16524311.png" type="image/png">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: #fff;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .status-tag { font-size: 13px; color: #16a085; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], textarea, select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            min-width: 140px;
        }
        .btn-encode-public { background-color: #3498db; }
        .btn-encode-public:hover { background-color: #2980b9; }
        .btn-encode-private { background-color: #8e44ad; }
        .btn-encode-private:hover { background-color: #71368a; }
        .btn-decode { background-color: #2ecc71; width: 100%; margin-top: 8px; }
        .btn-decode:hover { background-color: #27ae60; }
        .btn-copy { background-color: #e67e22; margin-top: 10px; width: 100%; }
        .btn-copy:hover { background-color: #d35400; }
        .btn-verify { background-color: #16a085; margin-top: 10px; width: 100%; }
        .btn-verify:hover { background-color: #117864; }
        .btn-admin-view { background-color: #e74c3c; margin-bottom: 15px; width: 100%; font-weight: bold;}
        .btn-admin-view:hover { background-color: #c0392b; }
        .btn-change-pw { background-color: #34495e; margin-top: 5px; width: 100%; }
        .btn-change-pw:hover { background-color: #2c3e50; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h2>📝 筆記本</h2>
    <div id="syncStatus" class="status-tag">📡 連線雲端資料庫中...</div>

    <div id="authBlock" class="form-group">
        <label for="userKey">🔑 請輸入密碼以解鎖：</label>
        <input type="password" id="userKey" placeholder="請先輸入個人存取密碼...">
        <button class="btn-verify" onclick="verifyPassword()">🔓 進入系統</button>
    </div>

    <div id="mainBlock" class="hidden">
        
        <button id="adminViewBtn" class="btn-admin-view hidden" onclick="showAllPasswords()">查看全體成員</button>
        
        <div id="adminMenuBlock" class="form-group hidden">
            <label for="encryptMode">⚙️ 管理員控制面板：切換個人加密對象</label>
            <select id="encryptMode">
                <option value="x9R2fK" selected>成員一 (小魚)</option>
                <option value="m4P7wQ">成員二 (Kris)</option>
                <option value="b2V9zX">成員三 (林沐恩)</option>
                <option value="t5N1sJ">成員四</option>
                <option value="k8C3hY">成員五</option>
                <option value="v6G2mD">成員六</option>
                <option value="a7F5eR">成員七 (吳彥普)</option>
                <option value="p3K8qZ">成員八</option>
            </select>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
        </div>

        <div class="form-group">
            <label for="inputText">📝 輸入內文：</label>
            <textarea id="inputText" placeholder="加密：輸入任意文字...&#10;解密：貼上密文自動解密..."></textarea>
        </div>

        <div class="btn-group">
            <button class="btn-encode-public" onclick="encodeProcess('public')">🌐 全員互通</button>
            <button class="btn-encode-private" onclick="encodeProcess('private')">🔒 加密</button>
        </div>
        
        <button class="btn-decode" onclick="decodeProcess()">🔓 辨識並解密</button>

        <div class="form-group" style="margin-top: 20px;">
            <label for="outputText">✨ 處理結果輸出：</label>
            <textarea id="outputText" readonly placeholder="結果會顯示在這裡..."></textarea>
        </div>

        <button class="btn-copy" onclick="copyResult()">📋 一鍵複製結果</button>

        <div class="form-group" style="border-top: 1px dashed #ccc; padding-top: 15px; margin-top: 25px;">
            <label for="newPasswordInput">🛠️ 修改個人密碼</label>
            <input type="password" id="newPasswordInput" placeholder="請輸入想要變更的新密碼...">
            <button class="btn-change-pw" onclick="changeCurrentPassword()">💾 確認修改</button>
        </div>
    </div>

<script>
// 🛡️ 防 F12 指令碼
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
    if (e.key === "F12" || 
        ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i','j'].includes(e.key.toLowerCase())) ||
        ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'u')) {
        e.preventDefault();
        return false;
    }
});

const SUPER_ADMIN_KEY = "jerrya1011201@cindya1011202";
const PUBLIC_PREFIX = "pub000";
const PUBLIC_KEY = "COMMON_MEMBER_SHARED_SECRET_2026";
const PREFIX_LENGTH = 6;

// 預設密碼表
let livePasswords = {
    "x9R2fK": "userpass1", // 成員一 (小魚)
    "m4P7wQ": "Kris@Lucy",  // 成員二 (Kris)
    "b2V9zX": "userpass3",  // 成員三 (林沐恩)
    "t5N1sJ": "userpass4",
    "k8C3hY": "userpass5",
    "v6G2mD": "userpass6",
    "a7F5eR": "userpass7",  // 成員七 (吳彥普)
    "p3K8qZ": "userpass8"
};

let currentRole = "user"; 
let loggedInPrefix = ""; 
let savedRawKey = "";    

// ⚡ 綁定自動偵測解密
const inputArea = document.getElementById('inputText');

inputArea.addEventListener('paste', () => {
    setTimeout(() => { autoDetectAndDecode(); }, 50);
});

inputArea.addEventListener('input', () => {
    autoDetectAndDecode();
});

function autoDetectAndDecode() {
    const val = inputArea.value.trim();
    if (val.length >= PREFIX_LENGTH) {
        const header = val.substring(0, PREFIX_LENGTH);
        const knownPrefixes = Object.keys(livePasswords);
        
        if (header === PUBLIC_PREFIX || knownPrefixes.includes(header)) {
            decodeProcess();
        }
    }
}

// 📡 開啟網頁時自動讀取本地/雲端資料
async function fetchCloudPasswords() {
    try {
        const localBackup = localStorage.getItem('SYNC_MEMBER_KEYS');
        if(localBackup) livePasswords = JSON.parse(localBackup);
        document.getElementById('syncStatus').innerText = "🟢 系統連線正常 (AES-256 就緒)";
    } catch (e) {
        document.getElementById('syncStatus').innerText = "🟡 系統就緒";
    }
}
fetchCloudPasswords();

function verifyPassword() {
    const inputKey = document.getElementById('userKey').value.trim();
    if (!inputKey) { alert("請輸入金鑰密碼！"); return; }
    savedRawKey = inputKey;

    if (inputKey === SUPER_ADMIN_KEY) {
        currentRole = "admin";
        document.getElementById('authBlock').classList.add('hidden'); 
        document.getElementById('mainBlock').classList.remove('hidden'); 
        document.getElementById('adminMenuBlock').classList.remove('hidden'); 
        document.getElementById('adminViewBtn').classList.remove('hidden'); 
    } else {
        const matchedPrefix = Object.keys(livePasswords).find(prefix => livePasswords[prefix] === inputKey);
        if (matchedPrefix) {
            currentRole = "user";
            loggedInPrefix = matchedPrefix; 
            document.getElementById('authBlock').classList.add('hidden'); 
            document.getElementById('mainBlock').classList.remove('hidden'); 
        } else {
            alert("❌ 密碼驗證失敗，拒絕存取！");
        }
    }
}

function showAllPasswords() {
    if (currentRole !== "admin") return;
    let msg = "📋 【全體成員最新密碼與神祕前綴對照表】\n\n";
    const names = ["成員一 (小魚)", "成員二 (Kris)", "成員三 (林沐恩)", "成員四", "成員五", "成員六", "成員七 (吳彥普)", "成員八"];
    Object.keys(livePasswords).forEach((prefix, i) => {
        msg += `${names[i]} ➡️ 前綴: ${prefix} | 密碼: ${livePasswords[prefix]}\n`;
    });
    alert(msg);
}

function changeCurrentPassword() {
    const newPassword = document.getElementById('newPasswordInput').value.trim();
    if (!newPassword) { alert("請輸入有效的新密碼！"); return; }
    let targetPrefix = (currentRole === "admin") ? document.getElementById('encryptMode').value : loggedInPrefix;
    
    livePasswords[targetPrefix] = newPassword;
    localStorage.setItem('SYNC_MEMBER_KEYS', JSON.stringify(livePasswords));
    
    alert(`💾 修改成功！個人通道密碼已重設為：${newPassword}`);
    document.getElementById('newPasswordInput').value = "";
    if (currentRole !== "admin") savedRawKey = newPassword;
}

// -------------------------------------------------------------
// 🔐 Web Crypto API (AES-256-GCM + PBKDF2) 軍規核心模組
// -------------------------------------------------------------

// 將明文密碼透過 PBKDF2 轉化為 256 位元的金鑰 (Key)
async function deriveKey(password, salt) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subcrypto ? crypto.subcrypto.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]) 
                                              : window.crypto.subcrypto; // compatibility
    const baseKey = await window.crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
    );
    return window.crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt: salt,
            iterations: 100000, // 強化防爆破
            hash: "SHA-256"
        },
        baseKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
    );
}

// 核心加密函式
async function encodeProcess(type) {
    let mode = ""; 
    let encryptionKey = "";

    if (type === 'public') {
        mode = PUBLIC_PREFIX;
        encryptionKey = PUBLIC_KEY;
    } else {
        if (currentRole === "admin") {
            mode = document.getElementById('encryptMode').value;
            encryptionKey = livePasswords[mode]; 
        } else {
            mode = loggedInPrefix;
            encryptionKey = savedRawKey;
        }
    }
    
    const input = document.getElementById('inputText').value;
    if(!input) { alert("請先輸入文字再加密！"); return; }

    try {
        const enc = new TextEncoder();
        // 1. 產生硬體級隨機 Salt (16 bytes) 與 IV (12 bytes)
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        const iv = window.crypto.getRandomValues(new Uint8Array(12));

        // 2. 衍生金鑰並加密
        const key = await deriveKey(encryptionKey, salt);
        const encryptedContent = await window.crypto.subtle.encrypt(
            { name: "AES-GCM", iv: iv },
            key,
            enc.encode(input)
        );

        // 3. 打包資料：前綴(6字元) + Salt(32Hex) + IV(24Hex) + 密文(Hex)
        const saltHex = Array.from(salt).map(b => b.toString(16).padStart(2, '0')).join('');
        const ivHex = Array.from(iv).map(b => b.toString(16).padStart(2, '0')).join('');
        const cipherHex = Array.from(new Uint8Array(encryptedContent)).map(b => b.toString(16).padStart(2, '0')).join('');

        document.getElementById('outputText').value = mode + saltHex + ivHex + cipherHex;
    } catch(e) {
        alert("⚠️ 加密過程發生錯誤！");
    }
}

// 核心解密函式
async function decodeProcess() {
    const input = document.getElementById('inputText').value.trim();
    if (input.length < PREFIX_LENGTH + 32 + 24) { // 前綴(6) + Salt(32) + IV(24) = 至少62位
        document.getElementById('outputText').value = "？？？";
        return;
    }
    
    const detectedHeader = input.substring(0, PREFIX_LENGTH);
    let targetPassword = "";
    
    if (detectedHeader === PUBLIC_PREFIX) {
        targetPassword = PUBLIC_KEY;
    } else {
        const rawPass = livePasswords[detectedHeader];
        if (rawPass && (currentRole === "admin" || savedRawKey === rawPass)) {
            targetPassword = rawPass;
        }
    }
    
    if (!targetPassword) {
        document.getElementById('outputText').value = "？？？ (無權限或密碼不符)";
        return;
    }

    try {
        // 拆解數據包
        const saltHex = input.substring(6, 38);
        const ivHex = input.substring(38, 62);
        const cipherHex = input.substring(62);

        const salt = new Uint8Array(saltHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
        const iv = new Uint8Array(ivHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
        const cipherBuffer = new Uint8Array(cipherHex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));

        // 衍生金鑰並解密
        const key = await deriveKey(targetPassword, salt);
        const decryptedContent = await window.crypto.subtle.decrypt(
            { name: "AES-GCM", iv: iv },
            key,
            cipherBuffer
        );

        const dec = new TextDecoder();
        document.getElementById('outputText').value = dec.decode(decryptedContent);
    } catch (e) {
        // AES-GCM 內建防篡改驗證，若被偷改或密碼錯會直接進 catch
        document.getElementById('outputText').value = "？？？ (密碼錯誤或數據已被篡改)";
    }
}

function copyResult() {
    const outputText = document.getElementById('outputText');
    if (!outputText.value) { alert("沒有內容可以複製！"); return; }
    outputText.select();
    navigator.clipboard.writeText(outputText.value).then(() => alert("📋 內容已成功複製！"));
}
</script>
</body>
</html>
